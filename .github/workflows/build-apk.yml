name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Check gradle files
        run: |
          ls -la ShuatiApp/
          cat ShuatiApp/gradle/wrapper/gradle-wrapper.properties
          cat ShuatiApp/build.gradle
          cat ShuatiApp/app/build.gradle

      - name: Fix gradlew
        run: |
          chmod +x gradlew
          # 确保 gradle wrapper 可下载（使用镜像加速）
          cd ShuatiApp
          sed -i 's|services.gradle.org|mirrors.cloud.tencent.com|g' gradle/wrapper/gradle-wrapper.properties || true
        working-directory: ShuatiApp

      - name: Build APK
        run: |
          cd ShuatiApp
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100