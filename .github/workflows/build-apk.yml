name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Check gradle files
        run: |
          ls -la ShuatiApp/
          cat ShuatiApp/gradle/wrapper/gradle-wrapper.properties
          cat ShuatiApp/build.gradle

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ShuatiApp

      - name: Build debug APK (for testing)
        run: |
          cd ShuatiApp
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: 刷题软件-APK
          path: ShuatiApp/app/build/outputs/apk/debug/*.apk
