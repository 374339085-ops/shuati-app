name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK (attempt 1)
        continue-on-error: true
        run: |
          cd ShuatiApp
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -200

      - name: Build APK (attempt 2 with retry)
        if: steps.build1.outcome == 'failure'
        run: |
          cd ShuatiApp
          gradle assembleDebug --no-daemon --stacktrace --refresh-dependencies 2>&1 | tail -200

      - name: Find APKs
        run: find . -name "*.apk" -type f 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 刷题软件APK
          path: "**/*.apk"
